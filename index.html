                                            const sIdx = idx + 12;
                                            const blockStart = EVENT_START + selectedDayIndex * 24 * 3600 * 1000 + sIdx * 3600 * 1000;
                                            const blockEnd = blockStart + 3600 * 1000;
                                            const isPast = activeTime >= blockEnd;
                                            const isRefresh = modeKey === 'REFRESH';
                                            const mode = MODES[modeKey];

                                            return (
                                                <div 
                                                    key={sIdx}
                                                    className={`flex flex-col p-1.5 rounded-lg border transition ${isPast ? 'bg-slate-900/10 border-slate-950/40 opacity-40' : isRefresh ? 'bg-purple-950/15 border-purple-900/40' : 'bg-slate-900 border-slate-800 hover:border-slate-700'}`}
                                                >
                                                    <span className="text-[9px] font-mono font-bold text-slate-400 text-center mb-1">
                                                        {String(sIdx).padStart(2, '0')}:00
                                                    </span>
                                                    {isRefresh ? (
                                                        <div className="text-[10px] py-1 bg-purple-600 text-slate-950 rounded font-black text-center select-none" title="リフレッシュ枠(自動固定)">
                                                            リフ
                                                        </div>
                                                    ) : (
                                                        <select
                                                            disabled={isPast}
                                                            value={modeKey}
                                                            onChange={(e) => handleBlockChange(selectedDayIndex, sIdx, e.target.value)}
                                                            className={`w-full text-[10px] p-1 font-black rounded border text-center outline-none cursor-pointer ${mode.color} ${mode.border} text-slate-950`}
                                                        >
                                                            {Object.keys(MODES).filter(k => k !== 'REFRESH').map(k => (
                                                                <option key={k} value={k} className="bg-slate-950 text-slate-200">
                                                                    {MODES[k].label.slice(0,2)}
                                                                </option>
                                                            ))}
                                                        </select>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                            </div>

                            {/* リフレッシュ設定に対するガイダンス */}
                            <div className="bg-purple-950/20 border border-purple-500/30 p-3 rounded-xl flex items-start gap-2.5 text-xs text-purple-200">
                                <i className="fa-solid fa-lightbulb text-purple-400 mt-0.5"></i>
                                <div>
                                    <span className="font-bold block">💡 リフレッシュ設定最適化ガイダンス</span>
                                    <p className="leading-relaxed mt-0.5 text-[11px] text-slate-300">
                                        日付跨ぎのログインロスや新ガシャ等の通信演出ロス(約5分)を回避するため、<span className="text-purple-300 font-bold">17時〜翌1時などの日付跨ぎ時間枠</span>に設定するのが最善手です。
                                        リフレッシュ時間中は獲得ptが0になりますが、おすすめ楽曲のプレイ（ログインボーナス4000トリガー獲得ミッション）は実行可能です。
                                    </p>
                                </div>
                            </div>
                        </section>

                        {/* SECTION 5: 30分詳細タイムライン推移シート */}
                        <section className="glass-panel p-5 rounded-2xl shadow-xl neon-border-pink flex flex-col gap-4">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                                <div>
                                    <h2 className="text-sm font-extrabold text-pink-400 flex items-center gap-2 tracking-wider">
                                        <i className="fa-solid fa-chart-line"></i>
                                        <span>Day {selectedDayIndex + 1} 精密シミュレーション・タイムライン (30分刻み)</span>
                                    </h2>
                                    <p className="text-[10px] text-slate-500">カレンダーに連動した、トリガー数および累積獲得ptの30分推移予測</p>
                                </div>

                                {/* シミュレーションターゲット */}
                                <div className="flex items-center gap-2 text-xs">
                                    <span className="text-slate-400 font-bold">逆算目標フェーズ:</span>
                                    <select 
                                        value={optimizationTarget} 
                                        onChange={(e) => setOptimizationTarget(e.target.value)}
                                        className="bg-slate-900 border border-slate-800 rounded px-3 py-1 font-bold text-pink-400 outline-none"
                                    >
                                        <option value="AUTO">現在フェーズ終了まで</option>
                                        <option value="HALFWAY">前半戦終了 (Day6)</option>
                                        <option value="END">イベント最終終了 (Day13)</option>
                                    </select>
                                </div>
                            </div>

                            <div className="max-h-[440px] overflow-y-auto rounded-xl border border-slate-800 no-scrollbar">
                                <table className="w-full text-left border-collapse">
                                    <thead className="sticky top-0 bg-slate-950 border-b border-slate-800 text-[11px] font-bold text-slate-400">
                                        <tr>
                                            <th className="p-3 text-center w-24">時刻</th>
                                            <th className="p-3 text-right">累積予測 pt</th>
                                            <th className="p-3 text-right">累積予測 トリガー</th>
                                            <th className="p-3 pl-8">シミュレート動き</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800/50 font-mono text-xs">
                                        {currentDayTimeline.map((item, idx) => {
                                            const actionInfo = ACTIONS[item.actionKey] || ACTIONS.IDLE;
                                            return (
                                                <tr 
                                                    key={idx} 
                                                    className={`transition ${item.isPast ? 'bg-slate-950/40 text-slate-600 opacity-45' : 'hover:bg-slate-900/30 text-slate-200'}`}
                                                >
                                                    <td className="p-3 text-center font-bold">{item.timeLabel}</td>
                                                    <td className="p-3 text-right text-yellow-400/95 font-bold">
                                                        {item.pt.toLocaleString()}
                                                    </td>
                                                    <td className="p-3 text-right text-cyan-400/95 font-bold">
                                                        {item.trigger.toLocaleString()}
                                                    </td>
                                                    <td className="p-3 pl-8">
                                                        <div className="flex items-center gap-2">
                                                            <i className={`${actionInfo.icon} ${actionInfo.color.replace('bg-', 'text-')} text-[10px]`}></i>
                                                            <span className="font-bold text-[11px]">{item.actionLabel}</span>
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </section>

                        {/* SECTION 6: 最適化アロケーション 逆算サマリー */}
                        <section className="glass-panel p-5 rounded-2xl shadow-xl neon-border-orange flex flex-col gap-4">
                            <h2 className="text-sm font-extrabold text-orange-400 flex items-center gap-2 tracking-wider">
                                <i className="fa-solid fa-calculator"></i>
                                <span>逆算最適化アロケーション計画 ({targetName}時点)</span>
                            </h2>
                            <p className="text-xs text-slate-400 leading-relaxed">
                                入力されたラップタイム、当日曲時間、各日スケジュール、および残りの物資から、目標終了時にぴったりトリガーをゼロにするための自動分配計画です。
                            </p>

                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 text-center">
                                <div className="bg-slate-950 p-3 rounded-xl border border-slate-800">
                                    <span className="text-[10px] text-slate-500 block font-bold mb-1">予定手動稼働時間</span>
                                    <span className="text-lg font-mono font-bold text-emerald-400">
                                        {Math.floor(simData.remManualSec / 3600)}時間 {Math.floor((simData.remManualSec % 3600) / 60)}分
                                    </span>
                                </div>
                                <div className="bg-slate-950 p-3 rounded-xl border border-slate-800">
                                    <span className="text-[10px] text-slate-500 block font-bold mb-1">予定オート稼働時間</span>
                                    <span className="text-lg font-mono font-bold text-cyan-400">
                                        {Math.floor(simData.remAutoSec / 3600)}時間 {Math.floor((simData.remAutoSec % 3600) / 60)}分
                                    </span>
                                </div>
                                <div className="bg-slate-950 p-3 rounded-xl border border-slate-800">
                                    <span className="text-[10px] text-slate-500 block font-bold mb-1">獲得予測pt増分</span>
                                    <span className="text-lg font-mono font-bold text-yellow-400">
                                        +{simData.maxPts.toLocaleString()} pt
                                    </span>
                                </div>
                                <div className="bg-slate-950 p-3 rounded-xl border border-slate-800 flex flex-col justify-center">
                                    <span className="text-[10px] text-slate-500 block font-bold">適合ステータス</span>
                                    <span className={`text-md font-extrabold mt-0.5 ${alloc.success ? 'text-emerald-400' : 'text-rose-400'}`}>
                                        {alloc.success ? '✓ トリガー全消費・適合成功' : '⚠️ 稼働時間不足'}
                                    </span>
                                </div>
                            </div>

                            {alloc.success ? (
                                <div className="flex flex-col gap-4">
                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 text-center">
                                        <div className="bg-slate-900 p-2.5 rounded-lg border border-emerald-500/10">
                                            <span className="text-[10px] text-emerald-400 font-bold block mb-1">手動貯め(セット)</span>
                                            <span className="text-xl font-bold font-mono text-white">{alloc.sm}</span>
                                            <span className="text-[8px] text-slate-500 block mt-0.5">※お仕事 + 当日曲4回分</span>
                                        </div>
                                        <div className="bg-slate-900 p-2.5 rounded-lg border border-cyan-500/10">
                                            <span className="text-[10px] text-cyan-400 font-bold block mb-1">オート貯め(セット)</span>
                                            <span className="text-xl font-bold font-mono text-white">{alloc.sa}</span>
                                            <span className="text-[8px] text-slate-500 block mt-0.5">※お仕事 + 当日曲4回分</span>
                                        </div>
                                        <div className="bg-slate-900 p-2.5 rounded-lg border border-emerald-500/10">
                                            <span className="text-[10px] text-pink-400 font-bold block mb-1">手動通常イベ曲</span>
                                            <span className="text-xl font-bold font-mono text-white">{alloc.em}</span>
                                            <span className="text-[8px] text-slate-500 block mt-0.5">※トリガー720個消費</span>
                                        </div>
                                        <div className="bg-slate-900 p-2.5 rounded-lg border border-cyan-500/10">
                                            <span className="text-[10px] text-purple-400 font-bold block mb-1">オート通常イベ曲</span>
                                            <span className="text-xl font-bold font-mono text-white">{alloc.ea}</span>
                                            <span className="text-[8px] text-slate-500 block mt-0.5">※トリガー720個消費</span>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 text-center">
                                        <div className="bg-slate-900 p-2.5 rounded-lg border border-fuchsia-500/10 flex justify-between items-center px-4">
                                            <span className="text-[11px] text-fuchsia-400 font-bold">手動スキップチケット消費</span>
                                            <span className="text-base font-bold font-mono text-white">{alloc.skm} 回</span>
                                        </div>
                                        <div className="bg-slate-900 p-2.5 rounded-lg border border-indigo-500/10 flex justify-between items-center px-4">
                                            <span className="text-[11px] text-indigo-400 font-bold">オートスキップチケット消費</span>
                                            <span className="text-base font-bold font-mono text-white">{alloc.ska} 回</span>
                                        </div>
                                    </div>

                                    <div className="bg-emerald-950/20 border border-emerald-500/20 p-3.5 rounded-xl text-xs text-slate-300 leading-relaxed">
                                        <span className="font-extrabold text-emerald-400 block mb-1">💡 最適イベラン動作アドバイス</span>
                                        本システムは「当日曲の時間が最も短い日」を手動/オート問わず最も適した<span className="text-emerald-300">貯め日</span>として優先的にスケジュールを組み立てます。
                                        また、<span className="text-purple-400 font-bold">前半最終日（Day 6）</span>と<span className="text-red-400 font-bold">イベント最終日（Day 13）</span>の有効な稼働枠にはスキップチケットが最優先で集中的に割り振られます。これにより、最終日にトリガーをピッタリかつ超高速で吐ききり、時間調整を安全に行う戦略を正確にサポートします。
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-rose-950/25 border border-rose-500/20 p-4 rounded-xl text-xs text-rose-300 leading-relaxed">
                                    ⚠️ スケジュール上の未来の稼働時間が極端に不足しているか、消化しきれない量のトリガーを抱えているため、最適解が抽出できません。
                                    カレンダー設定で「手動周回」や「完全オート」の時間スロット枠を増加させるか、リフレッシュや稼働不可時間を再確認してください。
                                </div>
                            )}
                        </section>

                    </main>

                    {/* Footer Credits */}
                    <footer className="text-center py-4 text-[10px] text-slate-600 font-mono tracking-wider">
                        MILLION LIVE ANNIVERSARY EVENT RUNNER ASSISTANT
                    </footer>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
